name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (flake8)
        run: |
          python3 -m flake8 scripts/ --max-line-length=100 --extend-ignore=E203

      - name: Run tests
        run: |
          python3 -m pytest tests/ -v --tb=short
